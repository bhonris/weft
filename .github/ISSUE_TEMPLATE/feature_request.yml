name: Feature request
description: Suggest an idea or enhancement for weft
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Please check the roadmap notes in `CLAUDE.md`
        ("next-worldline candidates") and existing issues before filing.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that weft makes hard or impossible today?
      placeholder: "As a ..., I want ... so that ... ."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should weft do? Sketch the UX and, if you can, where it fits the layer boundary (shared / core / main / renderer).
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've thought about.
    validations:
      required: false
